name: 3d_sweep2_b2
target: model_zigma.ZigMa
params:
    img_dim: 32
    in_channels: 4
    patch_size: 2
    num_classes: 101
    embed_dim: 768
    depth: 24 
    video_frames: ${data.video_frames}
    scan_type: v2
    use_pe: 2 # 0: no positional encoding, 1: fixed positional encoding, 2: learned positional encoding
    hierarchical_context: false
    hierarchy_window_size: 4
    hierarchy_stride: 4
    context_compress_type: mean
    hierarchy_max_stages: null
    hierarchy_stage_depths: null
    hierarchy_stage_depth: null
    hierarchy_allow_partial: false
    hierarchical_output_mode: prediction
    
