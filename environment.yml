name: MoHmamba_128

channels:
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=24
  - setuptools>=69
  - wheel
  - packaging
  - ninja
  - cmake
  - git
  - cuda-toolkit=12.8
  - gcc_linux-64=11
  - gxx_linux-64=11
  - libgcc-ng
  - libstdcxx-ng
  - pip:
      # PyTorch CUDA 12.8 wheels.
      # Verified against the official PyTorch cu128 install matrix.
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.7.1+cu128
      - torchvision==0.22.1+cu128
      - torchaudio==2.7.1+cu128

      # Training/runtime stack.
      - accelerate==1.13.0
      - diffusers==0.27.2
      - transformers==4.36.2
      - huggingface-hub==0.24.7
      - tokenizers==0.15.2
      - safetensors==0.7.0
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - webdataset==1.0.2
      - pytorch-lightning==2.6.1
      - torchmetrics==1.8.2
      - torch-fidelity==0.4.0
      - torchdiffeq==0.2.5
      - timm==1.0.25
      - einops==0.8.2
      - wandb==0.25.0
      - tqdm
      - numpy
      - scipy
      - scikit-learn
      - matplotlib
      - Pillow
      - requests
      - imageio
      - imageio-ffmpeg
      - av
      - blobfile
      - h5py
      - pandas
      - pyyaml
      - tensorboard
      - fvcore==0.1.5.post20221221
      - iopath==0.1.10
      - yacs==0.1.8
      - numpy-hilbert-curve==1.0.1
      - opencv-python-headless

# Native Mamba CUDA extensions must be installed after this environment exists,
# because their setup.py imports torch during build metadata generation.
#
#   conda activate MoHmamba_128
#   python -m pip install --no-build-isolation causal-conv1d==1.0.0
#   python -m pip install --no-build-isolation mamba-ssm==1.0.1
#
# Then verify:
#
#   python -c "import torch; import causal_conv1d_cuda, selective_scan_cuda; print(torch.__version__, torch.version.cuda)"
